name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  pytest:
    name: pytest — strategy engine & P&L math
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run strategy engine tests
        run: python -m pytest tests/test_strategy_engine.py tests/test_strategy_catalog.py -v --tb=short

      - name: Run P&L verification script
        run: python scripts/verify_strategy_pnl.py
